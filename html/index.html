<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qb-ui DrawText</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <link rel="stylesheet" href="css/ui.css" />
    <script src="js/ui.js" defer></script>
</head>
<body>
    <div id="drawtext-container">
        <div id="app" class="hidden">
            <div class="garage-btn">
                <i class="fa-solid fa-warehouse watermark"></i>

                <div class="key-cap">
                    <span id="keyText">E</span>
                </div>

                <div class="divider"></div>

                <div class="btn-text">
                    <div class="btn-label" id="mainText">Open Garage</div>
                    <div class="btn-sub" id="subText">Press to interact</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
